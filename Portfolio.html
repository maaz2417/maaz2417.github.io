    <style>
        * {
            margin: 0;

        }

        body {
            background-color: rgb(26, 26, 26);

        nav {
            display: flex;
            justify-content: space-around;

        .left {
            font-size: 2.7rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 80px 0;
        }

        .firstSection>div {
            width: 30%;
        }

        .leftSection {
            font-size: 3rem;
        }

        .leftSection .buttons {
            padding: 50px 0;
        }

        .leftSection .btn {
            padding: 5px 20px;
            font-size: 20px;
            background-color: rgb(0, 0, 0);
            color: white;
            border: 2px solid white;
            border-radius: 20px;
            cursor: pointer;
        }

        .rightSection img {
            width: 80%;
            margin: 50px 0;
        }
